[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["dashboard", ".venv", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]  # linha longa — controlada por line-length

[tool.ruff.lint.per-file-ignores]
"onboard_cliente.py" = ["F821"]  # {nome_curto} é interpolação Python dentro de template TS — falso positivo
"scripts/pulse_semanal.py" = ["E402", "I001"]  # import após sys.path.insert obrigatório

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["dashboard", ".venv"]
# NÃO adiciona disallow_untyped_defs — código sem type hints universais
